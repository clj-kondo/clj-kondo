schemaVersion: "1"
kind: mixin
name: clojure-repl
displayName: Clojure nREPL
description: Installs Java and Clojure, then starts nREPL.

caps:
  network:
    allow:
      - repo1.maven.org
      - repo.maven.apache.org
      - repo.clojars.org
      - github.com
      - raw.githubusercontent.com

commands:
  install:
    - command: |
        apt-get update
        apt-get install -y openjdk-21-jdk curl rlwrap
        curl -fsSL \
          https://github.com/clojure/brew-install/releases/latest/download/linux-install.sh \
          -o /tmp/linux-install.sh
        chmod +x /tmp/linux-install.sh
        /tmp/linux-install.sh

  startup:
    - command:
        - sh
        - -c
        - |
          cd /Users/borkdude/dev/clj-kondo
          exec clojure -Sdeps \
            '{:deps {nrepl/nrepl {:mvn/version "1.3.1"}}}' \
            -M -m nrepl.cmdline \
            --bind 0.0.0.0 \
            --port 7888 \
            > /tmp/nrepl.log 2>&1
      user: "1000"
      background: true
